name: Atualizar CSVs CAIXA

on:
  schedule:
    - cron: '15 12 * * *'  # 09:15 BRT (UTC-3) — após CAIXA atualizar
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  download-e-importar:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js e dependências
        run: |
          node --version
          npm install --prefix . puppeteer-core 2>/dev/null || npm install puppeteer-core

      - name: Instalar Chrome (necessário para Puppeteer resolver Radware)
        run: |
          # ubuntu-latest já vem com Chrome — confirma o caminho
          which google-chrome || which chromium-browser || apt-get install -y chromium-browser
          google-chrome --version 2>/dev/null || chromium-browser --version 2>/dev/null || true

      - name: Configurar SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Converte \n literal → quebra de linha real (Windows/clipboard pode escapar)
          # e remove CRLF. Funciona tanto se o secret tem newlines reais quanto escapados.
          printf '%s' "$VPS_SSH_KEY" \
            | sed 's/\\n/\n/g' \
            | tr -d '\r' \
            > ~/.ssh/id_ed25519
          # Garante newline final (obrigatório para OpenSSH)
          echo "" >> ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Diagnóstico sem expor a chave
          echo "Chave: $(wc -l < ~/.ssh/id_ed25519) linhas, $(wc -c < ~/.ssh/id_ed25519) bytes"
          ssh-keygen -l -f ~/.ssh/id_ed25519 2>&1 || echo "AVISO: ssh-keygen não validou a chave"
          ssh-keyscan -H lcmcreativestudio.vps-kinghost.net >> ~/.ssh/known_hosts 2>/dev/null

      - name: Baixar CSVs da CAIXA via Puppeteer
        run: |
          mkdir -p csvs
          CSV_DIR="$(pwd)/csvs" node caixa-csv-downloader.js
        env:
          CSV_DIR: ${{ github.workspace }}/csvs

      - name: Enviar CSVs para VPS e importar
        run: |
          COUNT=$(ls csvs/*.csv 2>/dev/null | wc -l)
          echo "Enviando $COUNT CSVs para a VPS..."

          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            csvs/*.csv \
            root@lcmcreativestudio.vps-kinghost.net:/var/www/dados/csv/

          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@lcmcreativestudio.vps-kinghost.net \
            "cd /var/www/arremate-br && \
             echo '[GitHub Actions] Iniciando import' >> /var/log/arremate_cron.log && \
             php scraper_caixa.php --import-only >> /var/log/arremate_cron.log 2>&1 && \
             COUNT=\$(sqlite3 /var/www/dados/imoveis.db 'SELECT COUNT(*) FROM imoveis;' 2>/dev/null || echo 0) && \
             echo \"[GitHub Actions] Import OK — \$COUNT imóveis\" >> /var/log/arremate_cron.log && \
             echo \"Import OK: \$COUNT imóveis no banco\""

      - name: Notificação de atualização bem-sucedida
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          COUNT=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@lcmcreativestudio.vps-kinghost.net \
            "sqlite3 /var/www/dados/imoveis.db 'SELECT COUNT(*) FROM imoveis;'" 2>/dev/null || echo 0)

          DATA=$(date -u -d '-3 hours' '+%d/%m/%Y %H:%M' 2>/dev/null || date '+%d/%m/%Y %H:%M')

          curl -s "https://ntfy.sh/${NTFY_TOPIC}" \
            -H "Title: ✅ Arremate atualizado — ${DATA} BRT" \
            -H "Priority: default" \
            -H "Tags: white_check_mark" \
            -d "🏠 ${COUNT} imóveis no banco atualizados com sucesso." || true

      - name: Alerta diário de oportunidades SP
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          # Busca top 5 em SP: Venda Online + Compra Direta, 40%+ desc, R$60k-120k
          # Inclui foto_url para anexar imagem em cada notificação
          RESULTADO=$(ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@lcmcreativestudio.vps-kinghost.net \
            "sqlite3 /var/www/dados/imoveis.db \
              \"SELECT cidade, tipo, ROUND(preco/100.0,0), CAST(desconto AS INTEGER), \
                       modalidade_raw, hdnimovel, COALESCE(foto_url,'') \
                FROM imoveis \
                WHERE uf='SP' \
                  AND desconto >= 40 \
                  AND preco BETWEEN 6000000 AND 12000000 \
                  AND modalidade_raw LIKE '%Venda Online%' \
                ORDER BY desconto DESC LIMIT 5;\"" 2>/dev/null)

          # Envia uma notificação por imóvel, com foto anexada
          while IFS='|' read -r cidade tipo preco desc modal hdn foto; do
            [ -z "$cidade" ] && continue

            if echo "$modal" | grep -qi "Direta"; then
              ICON="🏷️"; MODAL_LABEL="Compra Direta"
            else
              ICON="⏰"; MODAL_LABEL="Venda Online"
            fi

            LINK="https://venda-imoveis.caixa.gov.br/sistema/detalhe-imovel.asp?hdnimovel=${hdn}"
            TITULO="${ICON} ${cidade} | ${tipo^} | R\$ ${preco} (-${desc}%)"
            CORPO="${MODAL_LABEL} — Clique para ver detalhes e fotos na CAIXA"

            # Envia com foto se disponível, sem foto caso contrário
            if [ -n "$foto" ]; then
              curl -s "https://ntfy.sh/${NTFY_TOPIC}" \
                -H "Title: ${TITULO}" \
                -H "Priority: default" \
                -H "Tags: moneybag" \
                -H "Click: ${LINK}" \
                -H "Attach: ${foto}" \
                -d "${CORPO}" || true
            else
              curl -s "https://ntfy.sh/${NTFY_TOPIC}" \
                -H "Title: ${TITULO}" \
                -H "Priority: default" \
                -H "Tags: moneybag" \
                -H "Click: ${LINK}" \
                -d "${CORPO}" || true
            fi

            sleep 1  # intervalo entre notificações
          done <<< "$RESULTADO"

      - name: Scraping de datas de leilão/licitação
        run: |
          echo "Buscando imóveis sem data..."
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            root@lcmcreativestudio.vps-kinghost.net \
            "sqlite3 /var/www/dados/imoveis.db \
              \"SELECT hdnimovel FROM imoveis \
                WHERE (data_encerramento IS NULL OR data_encerramento='') \
                  AND (modalidade_raw LIKE '%Leil%' OR modalidade_raw LIKE '%Licita%' \
                    OR modalidade_raw LIKE '%Venda Online%') \
                  AND modalidade_raw NOT LIKE '%Direta%' \
                ORDER BY RANDOM() LIMIT 500;\"" > /tmp/hdns_sem_data.txt 2>/dev/null || true

          COUNT_HDNS=$(grep -c . /tmp/hdns_sem_data.txt 2>/dev/null || echo 0)
          echo "Imóveis para scraping: $COUNT_HDNS"

          if [ "$COUNT_HDNS" -eq 0 ]; then
            echo "Todos os imóveis já têm data — nenhum scraping necessário."
            exit 0
          fi

          # Executa scraping dos detalhes
          xargs node scrape-datas-leilao.js < /tmp/hdns_sem_data.txt || true

          # Aplica as datas encontradas no banco via SSH
          if [ -f /tmp/datas_leilao.json ]; then
            TOTAL_DATAS=$(python3 -c "import json; print(len(json.load(open('/tmp/datas_leilao.json'))))" 2>/dev/null || echo 0)
            echo "Datas encontradas: $TOTAL_DATAS"

            if [ "$TOTAL_DATAS" -gt 0 ]; then
              python3 gerar-sql-datas.py

              scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
                /tmp/update_datas.sql \
                root@lcmcreativestudio.vps-kinghost.net:/tmp/update_datas.sql

              ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
                root@lcmcreativestudio.vps-kinghost.net \
                "sqlite3 /var/www/dados/imoveis.db < /tmp/update_datas.sql && \
                 rm /tmp/update_datas.sql && \
                 echo \"[GitHub Actions] Datas atualizadas: $TOTAL_DATAS imóveis\" >> /var/log/arremate_cron.log && \
                 echo 'Banco atualizado com datas de leilão.'"
            fi
          fi
